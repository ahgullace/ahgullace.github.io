<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Public Record — Digital Archive</title>
<meta name="description" content="A searchable archive of speeches, social media posts, and press releases.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="masthead">
  <div class="masthead-top">
    <span>Est. 1984 — Ongoing</span>
    <span id="count-readout">— files</span>
  </div>
  <h1>The Public <span class="accent">Record</span></h1>
  <p class="tagline">A searchable archive of speeches, social media posts, and press releases. Every entry filed by date, type, and subject.</p>
</header>

<div class="controls">
  <div class="search-row">
    <input id="search-input" type="text" placeholder="Search titles, summaries, or tags…" aria-label="Search the archive">
  </div>
  <div class="filter-tabs" role="tablist" aria-label="Filter by document type">
    <button class="filter-tab tab-all" data-type="all" aria-pressed="true"><span class="dot"></span>All Files</button>
    <button class="filter-tab tab-speech" data-type="speech" aria-pressed="false"><span class="dot"></span>Speeches</button>
    <button class="filter-tab tab-social" data-type="social" aria-pressed="false"><span class="dot"></span>Social Posts</button>
    <button class="filter-tab tab-release" data-type="release" aria-pressed="false"><span class="dot"></span>Press Releases</button>
  </div>
</div>

<main class="file-drawer" id="file-list" aria-live="polite">
  <!-- entries rendered by script.js -->
</main>

<footer class="site-footer">
  Digital Archive — built as a static site. Replace sample entries in <code>data.js</code> with your own records.
</footer>

<div class="modal-overlay" id="modal-overlay">
  <div class="case-file" role="dialog" aria-modal="true" aria-label="Case file detail">
    <button class="close-btn" id="modal-close" aria-label="Close">&times;</button>
    <div id="modal-content"></div>
  </div>
</div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
